{
  "dataset": "backend/evaluation/datasets/local-v1-v1.json",
  "report_json": "backend/evaluation/reports/local-v1.json",
  "report_markdown": "backend/evaluation/reports/local-v1.md",
  "top_k": 3,
  "quality_equivalence_margin": 0.01,
  "ollama_base_url": "http://127.0.0.1:11434",
  "fixed_word": {"words": 140, "overlap_words": 30},
  "hierarchical_sentence": {
    "tokenizer_model": "BAAI/bge-m3",
    "chunker_config": {
      "child_target_tokens": 320,
      "child_max_tokens": 420,
      "child_overlap_tokens": 48,
      "child_max_duration_seconds": 75,
      "parent_target_tokens": 1000,
      "parent_max_tokens": 1400,
      "parent_max_duration_seconds": 300,
      "timing_gap_boundary_seconds": 2.5,
      "semantic_refinement": false
    }
  },
  "embeddings": {
    "qwen3": {"model": "qwen3-embedding:0.6b"},
    "bge_m3": {"model": "BAAI/bge-m3"}
  },
  "reranker": {"model": "BAAI/bge-reranker-v2-m3"}
}
